# Development: hot-reload, no rebuild on code changes.
# Run: docker compose -f docker-compose.dev.yml up
# Or: npm run dev:docker

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: slicebuilder
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  inference:
    image: roboflow/roboflow-inference-server-cpu:latest
    ports:
      - "9001:9001"

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile.dev
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/slicebuilder
      ROBOFLOW_INFERENCE_URL: http://inference:9001
      ROBOFLOW_MODEL_ID: ${ROBOFLOW_MODEL_ID:-}
      ROBOFLOW_INFERENCE_TASK: ${ROBOFLOW_INFERENCE_TASK:-object_detection}
      ROBOFLOW_API_KEY: ${ROBOFLOW_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - api

volumes:
  postgres_data:
  api_node_modules:
  web_node_modules:
